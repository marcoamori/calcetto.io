<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Calcio Manager - Statistiche Complete</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Helvetica Neue', sans-serif;
        }

        body {
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            border-bottom: 2px solid #ccc;
            padding-bottom: 10px;
        }

        .tab-btn {
            background: #e9ecef;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: #1e7e34;
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .tab-content {
            display: none;
            background: white;
            border-radius: 28px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .tab-content.active {
            display: block;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 25px;
            align-items: flex-end;
        }

        .form-group {
            flex: 1;
            min-width: 160px;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            color: #2c3e2f;
        }

        input, select, button {
            padding: 10px 12px;
            border-radius: 16px;
            border: 1px solid #ced4da;
            font-size: 0.95rem;
            width: 100%;
        }

        button {
            background: #2c6e2f;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background: #1e5620;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-danger {
            background: #dc3545;
        }

        .btn-danger:hover {
            background: #bb2d3b;
        }

        .btn-warning {
            background: #ffc107;
            color: #000;
        }

        .goal-section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 24px;
            margin-bottom: 20px;
        }

        .player-list {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 15px;
        }

        .player-card {
            background: white;
            border-radius: 20px;
            padding: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            width: 160px;
            text-align: center;
            border: 1px solid #dee2e6;
            transition: transform 0.2s;
        }

        .player-card:hover {
            transform: translateY(-3px);
        }

        .player-photo {
            width: 70px;
            height: 70px;
            background: #d9e3cc;
            border-radius: 50%;
            margin: 0 auto 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            overflow: hidden;
        }

        .badge-goalie {
            background: #ffc107;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 50px;
            display: inline-block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 20px;
            overflow: hidden;
        }

        th, td {
            border-bottom: 1px solid #e9ecef;
            padding: 12px;
            text-align: left;
        }

        th {
            background: #f8f9fa;
            font-weight: 700;
        }

        .matches-list {
            margin-top: 25px;
        }

        .match-item {
            background: #f1f3f5;
            margin-bottom: 12px;
            padding: 12px 18px;
            border-radius: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .match-info {
            flex: 1;
        }

        .match-actions {
            display: flex;
            gap: 10px;
        }

        .match-actions button {
            padding: 6px 12px;
            font-size: 0.85rem;
            width: auto;
        }

        .stats-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .export-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        @media (max-width: 700px) {
            .form-row {
                flex-direction: column;
            }
            .match-item {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <h1>⚽ Calcio Manager - Statistiche Complete</h1>

    <div class="tabs">
        <button class="tab-btn active" data-tab="newmatch">➕ Nuova Partita</button>
        <button class="tab-btn" data-tab="teams">🏆 Configura Squadre</button>
        <button class="tab-btn" data-tab="rankings">📊 Classifiche Individuali</button>
        <button class="tab-btn" data-tab="teamstats">🏅 Statistiche Squadre</button>
    </div>

    <!-- TAB NUOVA PARTITA -->
    <div id="newmatch" class="tab-content active">
        <h2>Registra Partita</h2>
        
        <div class="export-buttons">
            <button id="exportJSONBtn" class="btn-secondary">📥 Esporta JSON</button>
            <button id="exportCSVBtn" class="btn-secondary">📊 Esporta CSV</button>
            <button id="importDataBtn" class="btn-warning">📂 Importa Dati</button>
            <input type="file" id="importFile" accept=".json" style="display:none">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Squadra A</label>
                <select id="teamASelect"></select>
            </div>
            <div class="form-group">
                <label>Squadra B</label>
                <select id="teamBSelect"></select>
            </div>
            <div class="form-group">
                <label>Data partita</label>
                <input type="date" id="matchDate">
            </div>
        </div>

        <div class="goal-section">
            <h3>⚽ GOAL Squadra A</h3>
            <div class="form-row">
                <div class="form-group"><label>Numero goal A</label><input type="number" id="goalsA" min="0" value="0"></div>
                <div class="form-group"><label>Aggiungi marcatore</label><select id="scorerA"></select><button type="button" id="addScorerABtn" style="margin-top:6px">+ Aggiungi</button></div>
            </div>
            <ul id="scorersAList" style="margin-top:6px"></ul>
        </div>

        <div class="goal-section">
            <h3>⚽ GOAL Squadra B</h3>
            <div class="form-row">
                <div class="form-group"><label>Numero goal B</label><input type="number" id="goalsB" min="0" value="0"></div>
                <div class="form-group"><label>Aggiungi marcatore</label><select id="scorerB"></select><button type="button" id="addScorerBBtn" style="margin-top:6px">+ Aggiungi</button></div>
            </div>
            <ul id="scorersBList"></ul>
        </div>

        <div class="form-row">
            <div class="form-group"><label>🏅 MVP</label><select id="mvpSelect"></select></div>
            <div class="form-group"><label>🧤 Miglior Portiere</label><select id="bestKeeperSelect"></select></div>
        </div>

        <div class="form-row">
            <button id="saveMatchBtn">✅ REGISTRA PARTITA</button>
            <button id="cancelMatchBtn" class="btn-secondary">Annulla</button>
        </div>

        <h3>📋 Partite Registrate</h3>
        <div id="matchesList"></div>
    </div>

    <!-- TAB CONFIGURAZIONE SQUADRE -->
    <div id="teams" class="tab-content">
        <h2>Configurazione Squadre</h2>
        <div class="form-row">
            <div class="form-group"><label>🏷️ Squadra A - Nome</label><input type="text" id="teamAName" placeholder="es. Real Madrid"></div>
            <div class="form-group"><label>🖼️ Logo (emoji/testo)</label><input type="text" id="teamALogo" placeholder="🦁"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>🏷️ Squadra B - Nome</label><input type="text" id="teamBName" placeholder="es. Barcellona"></div>
            <div class="form-group"><label>🖼️ Logo (emoji/testo)</label><input type="text" id="teamBLogo" placeholder="🐐"></div>
        </div>
        <button id="saveTeamsBtn">💾 Salva Squadre</button>

        <hr>
        <h3>➕ Aggiungi Giocatore</h3>
        <div class="form-row">
            <div class="form-group"><label>Squadra</label><select id="playerTeamSelect"><option value="A">Squadra A</option><option value="B">Squadra B</option></select></div>
            <div class="form-group"><label>Nome</label><input id="playerName" placeholder="Nome e Cognome"></div>
            <div class="form-group"><label>Numero maglia</label><input id="playerNumber" type="number"></div>
            <div class="form-group"><label>Foto (emoji/testo)</label><input id="playerPhoto" placeholder="😎"></div>
            <div class="form-group"><label><input type="checkbox" id="playerIsGoalie"> Portiere</label></div>
            <button id="addPlayerBtn">Aggiungi</button>
        </div>

        <h3>📋 Lista Giocatori</h3>
        <div id="playersListContainer"></div>
    </div>

    <!-- TAB CLASSIFICHE INDIVIDUALI -->
    <div id="rankings" class="tab-content">
        <h2>Classifiche Individuali</h2>
        <div id="rankingsContainer"></div>
    </div>

    <!-- TAB STATISTICHE SQUADRE -->
    <div id="teamstats" class="tab-content">
        <h2>Statistiche Squadre</h2>
        <div id="teamStatsContainer"></div>
    </div>
</div>

<script>
    // ---------- STORAGE ----------
    let teams = { A: { name: "Squadra A", logo: "⚪", players: [] }, B: { name: "Squadra B", logo: "⚫", players: [] } };
    let matches = [];
    let editingMatchId = null;

    function loadData() {
        const storedTeams = localStorage.getItem("football_teams");
        if(storedTeams) teams = JSON.parse(storedTeams);
        const storedMatches = localStorage.getItem("football_matches");
        if(storedMatches) matches = JSON.parse(storedMatches);
        if(!teams.A.players) teams.A.players = [];
        if(!teams.B.players) teams.B.players = [];
    }
    
    function saveTeams() { localStorage.setItem("football_teams", JSON.stringify(teams)); }
    function saveMatches() { localStorage.setItem("football_matches", JSON.stringify(matches)); }

    // Helper per statistiche squadre
    function getTeamStats() {
        let stats = {
            A: { wins: 0, draws: 0, losses: 0, goalsFor: 0, goalsAgainst: 0, points: 0, matches: 0 },
            B: { wins: 0, draws: 0, losses: 0, goalsFor: 0, goalsAgainst: 0, points: 0, matches: 0 }
        };
        
        matches.forEach(match => {
            const teamA = match.teamA;
            const teamB = match.teamB;
            const goalsA = match.goalsA;
            const goalsB = match.goalsB;
            
            // Aggiorna goal
            stats[teamA].goalsFor += goalsA;
            stats[teamA].goalsAgainst += goalsB;
            stats[teamB].goalsFor += goalsB;
            stats[teamB].goalsAgainst += goalsA;
            stats[teamA].matches++;
            stats[teamB].matches++;
            
            // Risultato
            if (goalsA > goalsB) {
                stats[teamA].wins++;
                stats[teamA].points += 3;
                stats[teamB].losses++;
            } else if (goalsA < goalsB) {
                stats[teamB].wins++;
                stats[teamB].points += 3;
                stats[teamA].losses++;
            } else {
                stats[teamA].draws++;
                stats[teamA].points += 1;
                stats[teamB].draws++;
                stats[teamB].points += 1;
            }
        });
        
        return stats;
    }

    // UI Aggiornamenti
    function refreshAll() {
        refreshTeamSelects();
        refreshPlayerDropdowns();
        refreshMatchesList();
        refreshPlayersUI();
        refreshRankings();
        refreshTeamStats();
    }

    function refreshTeamSelects() {
        const selectA = document.getElementById("teamASelect");
        const selectB = document.getElementById("teamBSelect");
        if(selectA) selectA.innerHTML = `<option value="A">${teams.A.logo} ${teams.A.name}</option><option value="B">${teams.B.logo} ${teams.B.name}</option>`;
        if(selectB) selectB.innerHTML = `<option value="A">${teams.A.logo} ${teams.A.name}</option><option value="B">${teams.B.logo} ${teams.B.name}</option>`;
    }

    function refreshPlayerDropdowns() {
        const scorerASelect = document.getElementById("scorerA");
        const scorerBSelect = document.getElementById("scorerB");
        const mvpSelect = document.getElementById("mvpSelect");
        const keeperSelect = document.getElementById("bestKeeperSelect");

        function playersOptions(teamCode) {
            let opts = `<option value="">-- Seleziona --</option>`;
            (teams[teamCode]?.players || []).forEach(p => {
                opts += `<option value='${JSON.stringify({team:teamCode, playerName:p.name, number:p.number})}'>${p.name} (#${p.number}) ${p.isGoalie ? "🧤" : ""}</option>`;
            });
            return opts;
        }
        if(scorerASelect) scorerASelect.innerHTML = playersOptions("A");
        if(scorerBSelect) scorerBSelect.innerHTML = playersOptions("B");
        
        const allPlayers = [...teams.A.players.map(p=>({...p,team:"A"})), ...teams.B.players.map(p=>({...p,team:"B"}))];
        let allOpts = `<option value="">-- Nessuno --</option>`;
        allPlayers.forEach(p => {
            allOpts += `<option value='${JSON.stringify({team:p.team, playerName:p.name, number:p.number})}'>${teams[p.team].logo} ${p.name} (#${p.number})</option>`;
        });
        if(mvpSelect) mvpSelect.innerHTML = allOpts;
        if(keeperSelect) {
            let keepersOpts = `<option value="">-- Nessuno --</option>`;
            allPlayers.filter(p=>p.isGoalie).forEach(p=>{
                keepersOpts += `<option value='${JSON.stringify({team:p.team, playerName:p.name})}'>${teams[p.team].logo} ${p.name}</option>`;
            });
            keeperSelect.innerHTML = keepersOpts;
        }
    }

    let currentScorersA = [], currentScorersB = [];
    
    document.getElementById("addScorerABtn")?.addEventListener("click",()=>{
        const val = document.getElementById("scorerA").value;
        if(val){
            currentScorersA.push(JSON.parse(val));
            updateScorersUI();
        }
    });
    
    document.getElementById("addScorerBBtn")?.addEventListener("click",()=>{
        const val = document.getElementById("scorerB").value;
        if(val){
            currentScorersB.push(JSON.parse(val));
            updateScorersUI();
        }
    });
    
    function updateScorersUI(){
        const ulA = document.getElementById("scorersAList");
        ulA.innerHTML = currentScorersA.map((s,i)=>`<li>${s.playerName} (#${s.number}) <button onclick="removeScorer('A',${i})" style="margin-left:10px;width:auto;padding:2px 8px;">❌</button></li>`).join("");
        const ulB = document.getElementById("scorersBList");
        ulB.innerHTML = currentScorersB.map((s,i)=>`<li>${s.playerName} (#${s.number}) <button onclick="removeScorer('B',${i})" style="margin-left:10px;width:auto;padding:2px 8px;">❌</button></li>`).join("");
    }
    
    window.removeScorer = function(team, index) {
        if(team === 'A') currentScorersA.splice(index, 1);
        else currentScorersB.splice(index, 1);
        updateScorersUI();
    };

    document.getElementById("saveMatchBtn")?.addEventListener("click",()=>{
        const teamAcode = document.getElementById("teamASelect").value;
        const teamBcode = document.getElementById("teamBSelect").value;
        const goalsA = parseInt(document.getElementById("goalsA").value) || 0;
        const goalsB = parseInt(document.getElementById("goalsB").value) || 0;
        const mvpRaw = document.getElementById("mvpSelect").value;
        const keeperRaw = document.getElementById("bestKeeperSelect").value;
        const date = document.getElementById("matchDate").value || new Date().toISOString().slice(0,10);
        
        const match = {
            id: editingMatchId || Date.now(),
            teamA: teamAcode, teamB: teamBcode,
            goalsA, goalsB,
            scorersA: currentScorersA, scorersB: currentScorersB,
            mvp: mvpRaw ? JSON.parse(mvpRaw) : null,
            bestKeeper: keeperRaw ? JSON.parse(keeperRaw) : null,
            date
        };
        
        if(editingMatchId) {
            const index = matches.findIndex(m => m.id === editingMatchId);
            if(index !== -1) matches[index] = match;
            editingMatchId = null;
        } else {
            matches.push(match);
        }
        
        saveMatches();
        currentScorersA = [];
        currentScorersB = [];
        updateScorersUI();
        document.getElementById("goalsA").value = 0;
        document.getElementById("goalsB").value = 0;
        document.getElementById("matchDate").value = "";
        refreshAll();
    });

    window.editMatch = function(id) {
        const match = matches.find(m => m.id === id);
        if(match) {
            editingMatchId = id;
            document.getElementById("teamASelect").value = match.teamA;
            document.getElementById("teamBSelect").value = match.teamB;
            document.getElementById("goalsA").value = match.goalsA;
            document.getElementById("goalsB").value = match.goalsB;
            document.getElementById("matchDate").value = match.date;
            currentScorersA = [...match.scorersA];
            currentScorersB = [...match.scorersB];
            updateScorersUI();
            
            // Scroll to top
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    };
    
    window.deleteMatch = function(id) {
        if(confirm("Eliminare questa partita?")) {
            matches = matches.filter(m => m.id !== id);
            saveMatches();
            refreshAll();
        }
    };

    document.getElementById("cancelMatchBtn")?.addEventListener("click",()=>{
        currentScorersA = []; currentScorersB = [];
        editingMatchId = null;
        updateScorersUI();
        document.getElementById("goalsA").value = 0;
        document.getElementById("goalsB").value = 0;
        document.getElementById("matchDate").value = "";
    });

    function refreshMatchesList(){
        const container = document.getElementById("matchesList");
        if(!container) return;
        if(matches.length===0){ container.innerHTML = "<p>Nessuna partita registrata</p>"; return;}
        container.innerHTML = matches.map(m=>{
            const nameA = teams[m.teamA]?.name || m.teamA;
            const nameB = teams[m.teamB]?.name || m.teamB;
            return `<div class="match-item">
                        <div class="match-info">
                            <strong>${nameA} ${m.goalsA} - ${m.goalsB} ${nameB}</strong><br>
                            📅 ${m.date} | 🏅 MVP: ${m.mvp?.playerName || '-'} | 🧤 Portiere: ${m.bestKeeper?.playerName || '-'}<br>
                            ⚽ Marcatori A: ${m.scorersA.map(s=>s.playerName).join(", ") || "nessuno"}<br>
                            ⚽ Marcatori B: ${m.scorersB.map(s=>s.playerName).join(", ") || "nessuno"}
                        </div>
                        <div class="match-actions">
                            <button onclick="editMatch(${m.id})" class="btn-warning">✏️ Modifica</button>
                            <button onclick="deleteMatch(${m.id})" class="btn-danger">🗑️ Elimina</button>
                        </div>
                    </div>`;
        }).join("");
    }

    function refreshPlayersUI(){
        const container = document.getElementById("playersListContainer");
        container.innerHTML = `<h4>Squadra A (${teams.A.logo} ${teams.A.name})</h4><div class="player-list">`+
            teams.A.players.map(p=>`<div class="player-card"><div class="player-photo">${p.photo || "⚽"}</div><strong>${p.name}</strong><br>#${p.number}<br>${p.isGoalie ? '<span class="badge-goalie">🧤 Portiere</span>' : ''}</div>`).join("")+
            `</div><h4>Squadra B (${teams.B.logo} ${teams.B.name})</h4><div class="player-list">`+
            teams.B.players.map(p=>`<div class="player-card"><div class="player-photo">${p.photo || "⚽"}</div><strong>${p.name}</strong><br>#${p.number}<br>${p.isGoalie ? '<span class="badge-goalie">🧤 Portiere</span>' : ''}</div>`).join("")+
            `</div>`;
    }

    function refreshRankings(){
        let goalsScored = {}, mvpCount = {}, keeperClean={};
        matches.forEach(m=>{
            m.scorersA.forEach(s=>{ const key=`${s.team}|${s.playerName}`; goalsScored[key]=(goalsScored[key]||0)+1;});
            m.scorersB.forEach(s=>{ const key=`${s.team}|${s.playerName}`; goalsScored[key]=(goalsScored[key]||0)+1;});
            if(m.mvp) { const key=`${m.mvp.team}|${m.mvp.playerName}`; mvpCount[key]=(mvpCount[key]||0)+1; }
            if(m.bestKeeper) { const key=`${m.bestKeeper.team}|${m.bestKeeper.playerName}`; keeperClean[key]=(keeperClean[key]||0)+1; }
        });
        
        let rankingHtml = `<h3>⚽ Classifica Marcatori</h3>
        <table><thead><tr><th>Giocatore</th><th>Squadra</th><th>Goal</th></tr></thead><tbody>`;
        
        const sortedGoals = Object.entries(goalsScored).sort((a,b)=>b[1]-a[1]);
        for(let [key, goals] of sortedGoals){
            let [teamCode, name] = key.split("|");
            rankingHtml += `<tr><td>${teams[teamCode]?.logo||''} ${name}</td><td>${teams[teamCode]?.name}</td><td>${goals}</td></tr>`;
        }
        rankingHtml += `</tbody></table>
        
        <h3>🏅 MVP Classifica</h3>
        <table><thead><tr><th>Giocatore</th><th>Squadra</th><th>MVP vinti</th></tr></thead><tbody>`;
        
        const sortedMVP = Object.entries(mvpCount).sort((a,b)=>b[1]-a[1]);
        for(let [key, count] of sortedMVP){
            let [teamCode, name] = key.split("|");
            rankingHtml += `<tr><td>${teams[teamCode]?.logo||''} ${name}</td><td>${teams[teamCode]?.name}</td><td>${count}</td></tr>`;
        }
        rankingHtml += `</tbody></table>
        
        <h3>🧤 Migliori Portieri</h3>
        <table><thead><tr><th>Portiere</th><th>Squadra</th><th>Premi</th></tr></thead><tbody>`;
        
        const sortedKeepers = Object.entries(keeperClean).sort((a,b)=>b[1]-a[1]);
        for(let [key, count] of sortedKeepers){
            let [teamCode, name] = key.split("|");
            rankingHtml += `<tr><td>${teams[teamCode]?.logo||''} ${name}</td><td>${teams[teamCode]?.name}</td><td>${count}</td></tr>`;
        }
        rankingHtml += `</tbody></table>`;
        
        document.getElementById("rankingsContainer").innerHTML = rankingHtml;
    }

    function refreshTeamStats(){
        const stats = getTeamStats();
        const container = document.getElementById("teamStatsContainer");
        
        let html = `<div class="stats-card">
            <h3>🏆 Classifica Squadre</h3>
            <table>
                <thead>
                    <tr><th>Squadra</th><th>Partite</th><th>Vinte</th><th>Pareggi</th><th>Perse</th><th>Goal Fatti</th><th>Goal Subiti</th><th>Differenza</th><th>Punti</th></tr>
                </thead>
                <tbody>`;
        
        for(let team of ['A', 'B']) {
            const s = stats[team];
            const diff = s.goalsFor - s.goalsAgainst;
            html += `<tr>
                <td><strong>${teams[team].logo} ${teams[team].name}</strong></td>
                <td>${s.matches}</td>
                <td>${s.wins}</td>
                <td>${s.draws}</td>
                <td>${s.losses}</td>
                <td>${s.goalsFor}</td>
                <td>${s.goalsAgainst}</td>
                <td>${diff > 0 ? '+' : ''}${diff}</td>
                <td><strong>${s.points}</strong></td>
            </tr>`;
        }
        html += `</tbody></table></div>`;
        
        // Media goal partita
        const totalGoals = stats.A.goalsFor + stats.B.goalsFor;
        const avgGoals = matches.length > 0 ? (totalGoals / matches.length).toFixed(2) : 0;
        
        html += `<div class="stats-card">
            <h3>📈 Statistiche Generali</h3>
            <p>📊 Totale partite giocate: ${matches.length}</p>
            <p>⚽ Totale goal segnati: ${totalGoals}</p>
            <p>📈 Media goal per partita: ${avgGoals}</p>
            <p>🏆 Squadra più titolata: ${stats.A.points > stats.B.points ? teams.A.name : stats.B.points > stats.A.points ? teams.B.name : 'Pari merito'}</p>
        </div>`;
        
        container.innerHTML = html;
    }

    // Export/Import
    document.getElementById("exportJSONBtn")?.addEventListener("click",()=>{
        const data = { teams, matches };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `calcio_dati_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    });
    
    document.getElementById("exportCSVBtn")?.addEventListener("click",()=>{
        let csv = "Data,Squadra A,Squadra B,Goal A,Goal B,Marcatori A,Marcatori B,MVP,Miglior Portiere\n";
        matches.forEach(m => {
            const nameA = teams[m.teamA]?.name || m.teamA;
            const nameB = teams[m.teamB]?.name || m.teamB;
            csv += `"${m.date}","${nameA}","${nameB}",${m.goalsA},${m.goalsB},"${m.scorersA.map(s=>s.playerName).join("; ")}","${m.scorersB.map(s=>s.playerName).join("; ")}","${m.mvp?.playerName || ''}","${m.bestKeeper?.playerName || ''}"\n`;
        });
        const blob = new Blob([csv], {type: "text/csv"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `partite_${new Date().toISOString().slice(0,19)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
    });
    
    document.getElementById("importDataBtn")?.addEventListener("click",()=>{
        document.getElementById("importFile").click();
    });
    
    document.getElementById("importFile")?.addEventListener("change",(e)=>{
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                const data = JSON.parse(evt.target.result);
                if(data.teams) teams = data.teams;
                if(data.matches) matches = data.matches;
                saveTeams();
                saveMatches();
                refreshAll();
                alert("Dati importati con successo!");
            } catch(err) {
                alert("Errore nell'importazione: file non valido");
            }
        };
        reader.readAsText(file);
        e.target.value = "";
    });

    document.getElementById("saveTeamsBtn")?.addEventListener("click",()=>{
        teams.A.name = document.getElementById("teamAName").value || "Squadra A";
        teams.A.logo = document.getElementById("teamALogo").value || "⚪";
        teams.B.name = document.getElementById("teamBName").value || "Squadra B";
        teams.B.logo = document.getElementById("teamBLogo").value || "⚫";
        saveTeams();
        refreshAll();
    });

    document.getElementById("addPlayerBtn")?.addEventListener("click",()=>{
        const team = document.getElementById("playerTeamSelect").value;
        const name = document.getElementById("playerName").value.trim();
        const number = parseInt(document.getElementById("playerNumber").value);
        const photo = document.getElementById("playerPhoto").value.trim() || "👤";
        const isGoalie = document.getElementById("playerIsGoalie").checked;
        if(!name || isNaN(number)){ alert("Inserisci nome e numero"); return; }
        teams[team].players.push({ name, number, photo, isGoalie });
        saveTeams();
        refreshAll();
        document.getElementById("playerName").value = "";
        document.getElementById("playerNumber").value = "";
        document.getElementById("playerPhoto").value = "";
        document.getElementById("playerIsGoalie").checked = false;
    });

    // TAB SWITCH
    document.querySelectorAll(".tab-btn").forEach(btn=>{
        btn.addEventListener("click",()=>{
            document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
            btn.classList.add("active");
            document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
            document.getElementById(btn.dataset.tab).classList.add("active");
            refreshAll();
        });
    });

    loadData();
    refreshAll();
    if(!teams.A.name) teams.A.name="Squadra A";
    if(!teams.B.name) teams.B.name="Squadra B";
    saveTeams();
</script>
</body>
</html>
